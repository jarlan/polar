spring:
  application:
    name: dance-partner-challenge
  datasource:
    url: jdbc:sqlite:./data/dance.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8443
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-password: ${SSL_KEYSTORE_PASSWORD:dancechallenge}
    key-store-type: PKCS12
    key-alias: dance-app

app:
  qr-output-dir: ./generated-qr
  default-prize-threshold: 10

logging:
  level:
    com.polarsirkelrock: INFO
