<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Dans registrert!')}"></head>
<body class="bg-dark-dance">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div th:if="${isNew}">
                <div class="success-icon mb-4">
                    <i class="bi bi-check-circle-fill display-1 text-success"></i>
                </div>
                <h1 class="text-white fw-bold">Dans registrert!</h1>
                <p class="lead text-light">
                    Du danset nettopp med <strong class="text-dance" th:text="${partnerName}">Partner</strong>!
                </p>
                <div class="card bg-card mt-4">
                    <div class="card-body">
                        <p class="text-light mb-0">Fortsett å danse for å klatre på topplisten! 🏆</p>
                    </div>
                </div>
            </div>
            <div th:unless="${isNew}">
                <div class="mb-4">
                    <i class="bi bi-info-circle-fill display-1 text-info"></i>
                </div>
                <h1 class="text-white fw-bold">Allerede registrert!</h1>
                <p class="lead text-light">
                    Du har allerede danset med <strong class="text-dance" th:text="${partnerName}">Partner</strong>.
                    <br/>Finn noen nye!
                </p>
            </div>

            <div class="card bg-card mt-4">
                <div class="card-header bg-dance text-white text-center">
                    <h5 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Register ny dans</h5>
                </div>
                <div class="card-body p-3">
                    <p class="text-light text-center small mb-3">
                        Skann en ny QR-kode, eller skriv inn partner-ID manuelt:
                    </p>
                    <form id="newDanceForm" class="d-flex gap-2">
                        <input type="number" id="newPartnerId" class="form-control bg-dark text-white border-dance"
                               placeholder="Partner-ID" min="1" required/>
                        <button type="submit" class="btn btn-dance text-nowrap">
                            <i class="bi bi-arrow-right-circle me-1"></i>Go
                        </button>
                    </form>
                </div>
            </div>

            <div class="mt-4 d-flex gap-3 justify-content-center flex-wrap">
                <a th:href="@{/}" class="btn btn-outline-light btn-lg">
                    <i class="bi bi-house me-2"></i>Hjem
                </a>
                <a th:href="@{/leaderboard}" class="btn btn-dance btn-lg">
                    <i class="bi bi-trophy me-2"></i>Toppliste
                </a>
                <a th:href="@{/participant/{id}(id=${myId})}" class="btn btn-outline-dance btn-lg" th:if="${myId}">
                    <i class="bi bi-person me-2"></i>Mine statistikker
                </a>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
    (function () {
        var form = document.getElementById('newDanceForm');
        if (form) {
            form.addEventListener('submit', function (e) {
                e.preventDefault();
                var partnerId = document.getElementById('newPartnerId').value;
                if (partnerId) {
                    window.location.href = '/register?partner=' + encodeURIComponent(partnerId);
                }
            });
        }
    })();
</script>
</body>
</html>
