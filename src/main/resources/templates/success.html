<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Dance Registered!')}"></head>
<body class="bg-dark-dance">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div th:if="${isNew}">
                <div class="success-icon mb-4">
                    <i class="bi bi-check-circle-fill display-1 text-success"></i>
                </div>
                <h1 class="text-white fw-bold">Dance Registered!</h1>
                <p class="lead text-light">
                    You just danced with <strong class="text-dance" th:text="${partnerName}">Partner</strong>!
                </p>
                <div class="card bg-card mt-4">
                    <div class="card-body">
                        <p class="text-light mb-0">Keep dancing to climb the leaderboard! 🏆</p>
                    </div>
                </div>
            </div>
            <div th:unless="${isNew}">
                <div class="mb-4">
                    <i class="bi bi-info-circle-fill display-1 text-info"></i>
                </div>
                <h1 class="text-white fw-bold">Already Registered!</h1>
                <p class="lead text-light">
                    You already danced with <strong class="text-dance" th:text="${partnerName}">Partner</strong>.
                    <br/>Find someone new!
                </p>
            </div>

            <div class="mt-4 d-flex gap-3 justify-content-center flex-wrap">
                <a th:href="@{/}" class="btn btn-outline-light btn-lg">
                    <i class="bi bi-house me-2"></i>Home
                </a>
                <a th:href="@{/leaderboard}" class="btn btn-dance btn-lg">
                    <i class="bi bi-trophy me-2"></i>Leaderboard
                </a>
                <a th:href="@{/participant/{id}(id=${myId})}" class="btn btn-outline-dance btn-lg" th:if="${myId}">
                    <i class="bi bi-person me-2"></i>My Stats
                </a>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
