<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Hjem')}"></head>
<body class="bg-dark-dance">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container py-5">
    <div class="text-center mb-5">
        <div class="event-logo mb-4">
            <i class="bi bi-music-note-beamed display-1 text-dance"></i>
        </div>
        <h1 class="display-4 fw-bold text-white">Dance Partner Challenge</h1>
        <p class="lead text-light">Skann, dans, konkurrer!</p>
    </div>

    <div class="row g-4 mb-5">
        <div class="col-md-6">
            <div class="card stat-card text-center h-100">
                <div class="card-body">
                    <i class="bi bi-people display-4 text-dance"></i>
                    <h2 class="display-5 fw-bold text-white mt-2" th:text="${totalParticipants}">0</h2>
                    <p class="text-light">Totalt antall deltakere</p>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card stat-card text-center h-100">
                <div class="card-body">
                    <i class="bi bi-heart display-4 text-dance"></i>
                    <h2 class="display-5 fw-bold text-white mt-2" th:text="${totalDances}">0</h2>
                    <p class="text-light">Totalt registrerte danser</p>
                </div>
            </div>
        </div>
    </div>

    <div class="card bg-card">
        <div class="card-header bg-dance text-white">
            <h4 class="mb-0"><i class="bi bi-trophy me-2"></i>Topp 10 dansere</h4>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark table-hover mb-0">
                    <thead>
                        <tr>
                            <th width="60">#</th>
                            <th>Navn</th>
                            <th class="text-end">Unike partnere</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(leaderboard)}">
                            <td colspan="3" class="text-center text-muted py-4">Ingen danser registrert ennå. Kom deg på dansegulvet!</td>
                        </tr>
                        <tr th:each="entry : ${leaderboard}"
                            th:class="${entry.rank == 1 ? 'table-warning' : (entry.rank == 2 ? 'table-secondary' : (entry.rank == 3 ? 'rank-bronze' : ''))}">
                            <td>
                                <span th:if="${entry.rank == 1}"><i class="bi bi-trophy-fill text-warning"></i></span>
                                <span th:if="${entry.rank == 2}"><i class="bi bi-trophy-fill text-secondary"></i></span>
                                <span th:if="${entry.rank == 3}"><i class="bi bi-trophy-fill text-bronze"></i></span>
                                <span th:if="${entry.rank > 3}" th:text="${entry.rank}">4</span>
                            </td>
                            <td>
                                <a th:href="@{/participant/{id}(id=${entry.participantId})}"
                                   class="text-decoration-none text-white fw-bold"
                                   th:text="${entry.name}">Name</a>
                            </td>
                            <td class="text-end fw-bold" th:text="${entry.uniquePartners}">0</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="text-center mt-4">
        <a th:href="@{/leaderboard}" class="btn btn-dance btn-lg">
            <i class="bi bi-arrows-fullscreen me-2"></i>Full toppliste
        </a>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
