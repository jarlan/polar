<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Participant Stats')}"></head>
<body class="bg-dark-dance">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card bg-card mb-4">
                <div class="card-body text-center p-5">
                    <i class="bi bi-person-circle display-1 text-dance mb-3"></i>
                    <h1 class="text-white fw-bold" th:text="${participant.name}">Dancer Name</h1>
                    <p class="text-muted" th:if="${participant.email}" th:text="${participant.email}">email</p>
                    <div class="display-4 fw-bold text-dance mt-3" th:text="${uniqueCount}">0</div>
                    <p class="text-light">Unique Dance Partners</p>
                </div>
            </div>

            <div class="card bg-card">
                <div class="card-header bg-dance text-white">
                    <h5 class="mb-0"><i class="bi bi-people me-2"></i>Dance Partners</h5>
                </div>
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(partners)}" class="text-center text-muted py-4">
                        No dances registered yet!
                    </div>
                    <ul class="list-group list-group-flush" th:unless="${#lists.isEmpty(partners)}">
                        <li class="list-group-item bg-card-item text-white d-flex justify-content-between align-items-center"
                            th:each="partner : ${partners}">
                            <span>
                                <i class="bi bi-person me-2 text-dance"></i>
                                <a th:href="@{/participant/{id}(id=${partner.id})}"
                                   class="text-decoration-none text-white"
                                   th:text="${partner.name}">Name</a>
                            </span>
                            <span class="badge bg-dance rounded-pill">Danced!</span>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="text-center mt-4">
                <a th:href="@{/leaderboard}" class="btn btn-dance">
                    <i class="bi bi-trophy me-2"></i>View Leaderboard
                </a>
                <a th:href="@{/}" class="btn btn-outline-light ms-2">
                    <i class="bi bi-house me-2"></i>Home
                </a>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
